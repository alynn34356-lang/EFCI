<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Environmental Forensic Consultants Inc.</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: #0f0f10;
      color: white;
    }

    /* HEADER */
    .header {
      text-align: center;
      padding: 30px 20px 10px;
      background: linear-gradient(180deg, #1a1a1a, #0f0f10);
    }

    .header img {
      max-width: 900px;
      width: 100%;
      height: auto;
      border: 2px solid #ff2d2d;
      box-shadow: 0 0 20px rgba(255, 0, 0, 0.3);
    }

    /* NAV BAR */
    .nav {
      display: flex;
      justify-content: center;
      gap: 40px;
      padding: 15px;
      background: #111;
      border-top: 1px solid #222;
      border-bottom: 1px solid #222;
    }

    .nav a {
      color: white;
      text-decoration: none;
      font-weight: bold;
      letter-spacing: 1px;
    }

    .nav a:hover {
      color: #ff2d2d;
    }

    /* HERO */
    .hero {
      text-align: center;
      padding: 80px 20px;
    }

    .hero h1 {
      font-size: 40px;
      margin-bottom: 10px;
    }

    .hero p {
      max-width: 700px;
      margin: auto;
      line-height: 1.6;
      color: #cccccc;
    }

    .btn {
      margin-top: 25px;
      display: inline-block;
      padding: 12px 25px;
      border: 2px solid #ff2d2d;
      color: white;
      text-decoration: none;
      transition: 0.3s;
    }

    .btn:hover {
      background: #ff2d2d;
    }
  </style>
</head>

<body>

  <!-- HEADER IMAGE -->
  <div class="header">
    <img src="EFCI.png" alt="Environmental Forensic Consultants Inc. Logo">
  </div>

  <!-- NAVIGATION -->
  <div class="nav">
    <a href="#">HOME</a>
    <a href="#">ABOUT US</a>
    <a href="#">SERVICES</a>
    <a href="#">PROJECTS</a>
    <a href="#">CONTACT</a>
  </div>

  <!-- HERO SECTION -->
  <div class="hero">
    <h1>Environmental Forensic Consultants Inc.</h1>

    <p>
      We provide expert environmental investigations, forensic analysis, and consulting services.
      Our team delivers accurate results, scientific clarity, and practical solutions.
    </p>

    <a class="btn" href="#">LEARN MORE</a>
  </div>

</body>
</html>
